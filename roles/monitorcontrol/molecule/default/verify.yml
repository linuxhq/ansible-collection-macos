---
- name: Verify
  hosts: all
  tasks:
    - name: Ensure monitorcontrol application status is gathered
      tags:
        - monitorcontrol
      ansible.builtin.stat:
        path: /Applications/MonitorControl.app
      register: __monitorcontrol_present_stat

    - name: Ensure monitorcontrol application is present
      tags:
        - monitorcontrol
      ansible.builtin.assert:
        that:
          - __monitorcontrol_present_stat.stat.exists

    - name: Ensure monitorcontrol role is included with an absent state
      tags:
        - monitorcontrol
      ansible.builtin.include_role:
        name: monitorcontrol
      vars:
        monitorcontrol_state: absent

    - name: Ensure monitorcontrol application status is gathered after removal
      tags:
        - monitorcontrol
      ansible.builtin.stat:
        path: /Applications/MonitorControl.app
      register: __monitorcontrol_absent_stat

    - name: Ensure monitorcontrol application is absent
      tags:
        - monitorcontrol
      ansible.builtin.assert:
        that:
          - not __monitorcontrol_absent_stat.stat.exists
...
