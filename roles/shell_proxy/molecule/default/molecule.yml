---
dependency:
  name: galaxy
  options:
    requirements-file: ../../requirements.yml

driver:
  name: vagrant
  provider:
    name: tart

platforms:
  - name: tahoe
    hostname: false
    memory: 8192
    cpus: 4
    provider_options:
      disk: 60
      image: ghcr.io/cirruslabs/macos-tahoe-base:latest
      name: tahoe
    config_options:
      synced_folder: false
      ssh.username: admin
      ssh.password: admin
      vm.boot_timeout: 900

provisioner:
  name: ansible
  env:
    ANSIBLE_ACTION_WARNINGS: false
    ANSIBLE_DEPRECATION_WARNINGS: false
  log: true
  options:
    diff: true
  inventory:
    group_vars:
      all:
        shell_proxy_ftp: true
        shell_proxy_ftp_hostname: proxy.local
        shell_proxy_ftp_password: p@ss/word
        shell_proxy_ftp_port: 2121
        shell_proxy_ftp_username: user@corp
        shell_proxy_http: true
        shell_proxy_http_hostname: proxy.local
        shell_proxy_http_password: p@ss/word
        shell_proxy_http_port: 8118
        shell_proxy_http_username: user@corp
        shell_proxy_https: true
        shell_proxy_https_hostname: proxy.local
        shell_proxy_https_password: p@ss/word
        shell_proxy_https_port: 8443
        shell_proxy_https_username: user@corp

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - check
    - converge
    - check
    - idempotence
    - verify
    - cleanup
    - destroy

verifier:
  name: ansible
  options:
    diff: true
...
