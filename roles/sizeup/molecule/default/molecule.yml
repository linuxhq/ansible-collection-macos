---
dependency:
  name: galaxy
  options:
    requirements-file: ../../requirements.yml

driver:
  name: vagrant
  provider:
    name: tart

platforms:
  - name: tahoe
    hostname: false
    memory: 8192
    cpus: 4
    provider_options:
      disk: 60
      image: ghcr.io/cirruslabs/macos-tahoe-base:latest
      name: tahoe
    config_options:
      synced_folder: false
      ssh.username: admin
      ssh.password: admin
      vm.boot_timeout: 900

provisioner:
  name: ansible
  env:
    ANSIBLE_ACTION_WARNINGS: false
    ANSIBLE_DEPRECATION_WARNINGS: false
  log: true
  options:
    diff: true
  inventory:
    group_vars:
      all:
        sizeup_defaults:
          - key: CenterNonResizableWindows
            type: bool
            value: true
          - key: KeepWindowsInBounds
            type: bool
            value: true
          - key: MenuEnabled
            type: bool
            value: true
          - key: MultiMonitorResizeWindowProportionally
            type: bool
            value: true
          - key: SUEnableAutomaticChecks
            type: bool
            value: true
          - key: ShortcutsDisabled
            type: bool
            value: false
          - key: ShowOverlay
            type: bool
            value: true
          - key: ShowPrefsOnLaunch
            type: bool
            value: false
          - key: ShowPrefsOnNextStart
            type: bool
            value: false
          - key: ShowTooltips
            type: bool
            value: false
          - key: TakeDrawersIntoAccount
            type: bool
            value: true
          - key: suppressMenuBarDisabledPopup
            type: bool
            value: true

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - check
    - converge
    - check
    - idempotence
    - verify
    - cleanup
    - destroy

verifier:
  name: ansible
  options:
    diff: true
...
