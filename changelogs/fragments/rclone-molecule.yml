---
breaking_changes:
  - rclone - install the package with Homebrew instead of downloading release
    archives from downloads.rclone.org; the ``rclone_version`` variable is
    removed and ``rclone_path_bin`` is now a list of directories searched for
    the binary via the launchd agent's ``PATH``.
minor_changes:
  - rclone - gather launchd agent status with the ``launchd_info`` module and
    only start agents that are not already running.
  - rclone - mount remotes with ``rclone nfsmount`` instead of ``rclone
    mount``, removing the macFUSE requirement on macOS.
  - rclone - only create the ``~/Library/LaunchAgents`` directory when mounts
    are defined.
trivial:
  - rclone - add a molecule scenario running the role against a Tart macOS
    virtual machine via the vagrant driver.
...
