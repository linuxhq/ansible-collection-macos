---
add object.role:
  - name: homebrew_tap
    description: Manage homebrew taps.
breaking_changes:
  - homebrew - move tap management to the new ``homebrew_tap`` role; the
    ``homebrew_taps`` variable is removed.
minor_changes:
  - homebrew_tap - trust taps with ``brew trust`` after tapping so packages
    from third-party taps can be installed.
trivial:
  - homebrew_tap - add a molecule scenario running the role against a Tart
    macOS virtual machine via the vagrant driver.
